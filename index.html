<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>🌱 ระบบฟาร์มรดน้ำต้นไม้อัจฉริยะ</h1>
        <div id="status" class="status-badge">กำลังเชื่อมต่อ...</div>
    </div>

    <div class="sensor-container">
        <div class="sensor-card">
            <h3>🌡️ อุณหภูมิ (Temperature)</h3>
            <div class="sensor-value"><span id="temp">0.0</span> °C</div>
        </div>
        <div class="sensor-card humidity">
            <h3>💧 ความชื้น (Humidity)</h3>
            <div class="sensor-value"><span id="hum">0.0</span> %</div>
        </div>
    </div>

    <div class="zones-grid" id="zones-container">
        </div>

    <script src="script.js"></script>
</body>
</html>

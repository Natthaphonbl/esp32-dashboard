<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-decoration">
        <div class="bg-circle c1"></div>
        <div class="bg-circle c2"></div>
        <div class="bg-circle c3"></div>
        <div class="bg-grid"></div>
    </div>

    <div class="wrapper">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">🌱</div>
            <div class="header-text">
                <h1>Smart Farm Mr. Wat</h1>
                <p>ระบบรดน้ำต้นไม้อัจฉริยะ</p>
            </div>
            <div id="status" class="status-badge">
                <span class="status-dot"></span>
                กำลังเชื่อมต่อ...
            </div>
        </div>

        <!-- ESP32 Device Status Bar -->
        <div class="device-status-bar" id="device-status-bar">
            <div class="device-status-item">
                <span class="ds-icon">📡</span>
                <span class="ds-label">ESP32</span>
                <span class="ds-value" id="esp-status">ไม่พบอุปกรณ์</span>
                <span class="ds-dot" id="esp-dot"></span>
            </div>
            <div class="device-status-item">
                <span class="ds-icon">📶</span>
                <span class="ds-label">Wi-Fi</span>
                <span class="ds-value" id="wifi-rssi">--</span>
            </div>
            <div class="device-status-item">
                <span class="ds-icon">🌐</span>
                <span class="ds-label">IP</span>
                <span class="ds-value" id="wifi-ip">--</span>
            </div>
            <div class="device-status-item">
                <span class="ds-icon">⏱</span>
                <span class="ds-label">Uptime</span>
                <span class="ds-value" id="uptime">--</span>
            </div>
            <div class="device-status-item">
                <span class="ds-icon">🔄</span>
                <span class="ds-label">อัปเดตล่าสุด</span>
                <span class="ds-value" id="last-seen">--</span>
            </div>
        </div>

        <!-- Sensor Cards -->
        <div class="sensor-container">
            <div class="sensor-card temp-card">
                <div class="sensor-icon">🌡️</div>
                <div class="sensor-info">
                    <span class="sensor-label">อุณหภูมิ</span>
                    <div class="sensor-value"><span id="temp">--</span><span class="unit">°C</span></div>
                </div>
                <div class="sensor-bar"><div class="sensor-fill temp-fill" id="temp-fill"></div></div>
            </div>
            <div class="sensor-card hum-card">
                <div class="sensor-icon">💧</div>
                <div class="sensor-info">
                    <span class="sensor-label">ความชื้น</span>
                    <div class="sensor-value"><span id="hum">--</span><span class="unit">%</span></div>
                </div>
                <div class="sensor-bar"><div class="sensor-fill hum-fill" id="hum-fill"></div></div>
            </div>
            <div class="sensor-card time-card">
                <div class="sensor-icon">🕐</div>
                <div class="sensor-info">
                    <span class="sensor-label">เวลาปัจจุบัน</span>
                    <div class="sensor-value clock" id="clock">--:--</div>
                </div>
            </div>
        </div>

        <div class="section-title">
            <h2>🗺️ โซนรดน้ำทั้งหมด</h2>
            <span class="zone-count">8 โซน</span>
        </div>

        <div class="zones-grid" id="zones-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
